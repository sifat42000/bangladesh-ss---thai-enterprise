<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>বাংলাদেশ এস এস এন্ড থাই এন্টারপ্রাইজ | SS Railing & Thai Aluminium Solution in Bangladesh</title>
    <meta name="description" content="Best SS railing, Thai aluminium windows, and glass door fittings in Bangladesh. Providing premium quality stainless steel work and office partitions." />
    <!-- 404 Fallback for SPAs -->
    <script type="text/javascript">
      // This script will redirect to the home page while preserving the original path
      // This is a common workaround for GitHub Pages and other simple static hosts
      var pathSegmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
